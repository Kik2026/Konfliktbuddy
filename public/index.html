<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konfliktbegleiter</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5f0eb;font-family:'Source Sans 3',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    .wrap{width:100%;max-width:680px;min-height:100vh;display:flex;flex-direction:column;padding:0 16px}
    .header{padding:32px 0 20px;text-align:center;border-bottom:1px solid #d9d0c5}
    .header-title{font-family:'Lora',serif;font-size:22px;font-weight:500;color:#3a2f28;letter-spacing:.02em}
    .header-sub{font-size:12px;color:#9c8a7a;margin-top:6px;font-weight:300;letter-spacing:.07em;text-transform:uppercase}
    .msgs{flex:1;padding:28px 0;display:flex;flex-direction:column;gap:20px}
    .row{display:flex;gap:12px;align-items:flex-start}
    .row.user{flex-direction:row-reverse}
    .av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:2px}
    .av.assistant{background:#c4a882;color:#fff;font-family:'Lora',serif;font-style:italic}
    .av.user{background:#3a2f28;color:#f5f0eb;font-weight:500;font-size:11px;letter-spacing:.04em}
    .bubble{max-width:82%;padding:14px 18px;border-radius:4px;line-height:1.75;font-size:15px}
    .bubble.assistant{background:#fff;color:#3a2f28;font-family:'Lora',serif;border:1px solid #e8dfd4;border-left:3px solid #c4a882;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .bubble.user{background:#3a2f28;color:#f5f0eb;font-size:14.5px}
    .typing{display:flex;gap:5px;align-items:center;padding:16px 18px;background:#fff;border:1px solid #e8dfd4;border-left:3px solid #c4a882;border-radius:4px;width:fit-content}
    .dot{width:6px;height:6px;background:#c4a882;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
    .error{background:#fff3f0;border-left:3px solid #c4624a;padding:12px 16px;border-radius:4px;font-size:13px;color:#7a3a2a}
    .input-area{padding:16px 0 28px;border-top:1px solid #d9d0c5}
    .input-row{display:flex;gap:10px;align-items:flex-end;background:#fff;border:1px solid #d9d0c5;border-radius:4px;padding:10px 12px;transition:border-color .2s}
    .input-row:focus-within{border-color:#c4a882}
    textarea{flex:1;border:none;outline:none;resize:none;font-family:'Source Sans 3',sans-serif;font-size:14.5px;font-weight:300;color:#3a2f28;background:transparent;line-height:1.6;min-height:24px;max-height:120px}
    textarea::placeholder{color:#b5a89a}
    .btn{background:#c4a882;border:none;border-radius:3px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .btn:hover:not(:disabled){background:#b8966e}
    .btn:disabled{background:#ddd5ca;cursor:not-allowed}
    .hint{font-size:11px;color:#b5a89a;text-align:center;margin-top:10px;letter-spacing:.03em}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-title">Konfliktbegleiter</div>
      <div class="header-sub">Ein Raum zum Verstehen</div>
    </div>
    <div class="msgs" id="msgs">
      <div class="row assistant">
        <div class="av assistant">k</div>
        <div class="bubble assistant">Willkommen. Was beschäftigt dich gerade? Erzähl einfach – es muss nichts geordnet sein.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="Schreib einfach..." rows="1"></textarea>
        <button class="btn" id="btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="hint">Enter zum Senden · Shift+Enter für neue Zeile</div>
    </div>
  </div>
  <script>
    const msgsEl=document.getElementById("msgs");
    const inputEl=document.getElementById("input");
    const btnEl=document.getElementById("btn");
    let messages=[];
    let loading=false;

    inputEl.addEventListener("input",()=>{
      inputEl.style.height="auto";
      inputEl.style.height=Math.min(inputEl.scrollHeight,120)+"px";
      btnEl.disabled=!inputEl.value.trim()||loading;
    });

    inputEl.addEventListener("keydown",(e)=>{
      if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
    });

    btnEl.addEventListener("click",sendMessage);

    function addMessage(role,content){
      const row=document.createElement("div");
      row.className=`row ${role}`;
      const av=document.createElement("div");
      av.className=`av ${role}`;
      av.textContent=role==="assistant"?"k":"du";
      const bubble=document.createElement("div");
      bubble.className=`bubble ${role}`;
      bubble.innerHTML=content.split("\n").map(l=>l||"<br>").join("<br>");
      row.appendChild(av);
      row.appendChild(bubble);
      msgsEl.appendChild(row);
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }

    function addTyping(){
      const row=document.createElement("div");
      row.className="row assistant";
      row.id="typing";
      const av=document.createElement("div");
      av.className="av assistant";
      av.textContent="k";
      const t=document.createElement("div");
      t.className="typing";
      t.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(av);
      row.appendChild(t);
      msgsEl.appendChild(row);
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }

    function removeTyping(){
      const t=document.getElementById("typing");
      if(t)t.remove();
    }

      const text=inputEl.value.trim();
      if(!text||loading)return;
